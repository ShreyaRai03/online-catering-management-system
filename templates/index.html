<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Master</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Custom Styling */
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ffafbd, #ffc3a0);
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            animation: bounce 2s infinite ease-in-out;
        }
        h1 {
            text-align: center;
            color: #f05685;
            margin-bottom: 20px;
        }
        h2 {
            color:#ff4757;
            margin-bottom: 15px;
        }
        .btn {
            border-radius: 8px;
            font-size: 16px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }
        .btn-primary {
            background:linear-gradient(to right, #ff5f6d, #ffc371);
            border: none;
        }
        .btn-primary:hover {
            background:linear-gradient(to right, #ff5f6d, #ffc371);
        }
        .btn-warning {
            background:linear-gradient(to right, #ff5f6d, #ffc371);
            border: none;
        }
        .btn-warning:hover {
            background:linear-gradient(to right, #ff5f6d, #ffc371);
        }
        .btn-secondary {
            background:linear-gradient(to right, #ff5f6d, #ffc371);
            border: none;
        }
        .btn-secondary:hover {
            background:linear-gradient(to right, #ff5f6d, #ffc371);
        }
        .btn-success {
            background:linear-gradient(to right, #ff5f6d, #ffc371);
            border: none;
        }
        .btn-success:hover {
            background:linear-gradient(to right, #ff5f6d, #ffc371);
        }
        .row {
            margin-top: 20px;
        }
        .col-md-6 {
            text-align: center;
            margin-bottom: 20px;
        }
        .col-md-6 h2 {
            margin-bottom: 20px;
        }

        /* Animation */
        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1>Meal Master</h1>
        <div class="row">
            <div class="col-md-6">
                <h2>Service Provider</h2>
                <a href="{{ url_for('service_provider_signup') }}" class="btn btn-primary">Service Provider Signup</a><br><br>
                <a href="{{ url_for('update_service_provider_items') }}" class="btn btn-warning">Update Item Rates</a>
            </div>
            <div class="col-md-6">
                <h2>Customer</h2>
                <a href="{{ url_for('customer_signup') }}" class="btn btn-secondary">Customer Signup</a><br><br>
                <a href="{{ url_for('place_order') }}" class="btn btn-success">Place Order</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
