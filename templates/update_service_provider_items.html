<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Item Rates</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Custom Styling */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
        }
        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #f10505;
            margin-bottom: 20px;
        }
        .form-label {
            font-weight: bold;
        }
        .btn-primary {
            background-color: #f10505;
            border: none;
        }
        .btn-primary:hover {
            background-color: #f10505;
        }
        .list-group-item {
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .list-group-item .row {
            align-items: center;
        }
        .list-group-item label {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Update Item Rates</h1>
        <form method="POST">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>

            {% if items %}
                <h3 class="mt-4">Item Rates</h3>
                <div class="list-group">
                    {% for item in items %}
                        <div class="list-group-item">
                            <div class="row">
                                <div class="col-md-6">
                                    <label>{{ item['name'] }}</label>
                                </div>
                                <div class="col-md-6">
                                    <input type="number" class="form-control" name="rate_{{ item['name'] }}" value="{{ item['rate'] }}" step="0.01" required>
                                </div>
                            </div>
                        </div>
                    {% endfor %}
                </div>
            {% else %}
                <p>No items available to update.</p>
            {% endif %}

            <button type="submit" class="btn btn-primary mt-3 w-100">Update Rates</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
